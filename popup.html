<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>PR Branch Warning Settings</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 340px;
      padding: 14px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      font-size: 14px;
      color: #24292f;
      background: #fff;
    }
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }
    h2 { font-size: 15px; font-weight: 600; }
    #langToggle {
      font-size: 11px;
      color: #57606a;
      background: #f6f8fa;
      border: 1px solid #d0d7de;
      border-radius: 4px;
      padding: 3px 8px;
      cursor: pointer;
      white-space: nowrap;
    }
    #langToggle:hover { background: #eaeef2; }

    /* Tabs */
    .tabs { display: flex; gap: 4px; margin-bottom: 12px; }
    .tab {
      flex: 1;
      padding: 5px 6px;
      border: 1px solid #d0d7de;
      border-radius: 6px;
      background: #f6f8fa;
      cursor: pointer;
      font-size: 12px;
      font-weight: 500;
      color: #57606a;
    }
    .tab:hover { background: #eaeef2; }
    .tab.active { background: #0969da; color: #fff; border-color: #0969da; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }

    /* Shared section styles */
    .section-label {
      font-size: 12px; font-weight: 600; color: #57606a;
      text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 8px;
    }
    .desc { font-size: 11px; color: #57606a; margin-bottom: 8px; line-height: 1.4; }
    ul { list-style: none; margin-bottom: 10px; }
    .branch-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 6px 10px; background: #f6f8fa; border: 1px solid #d0d7de;
      border-radius: 6px; margin-bottom: 4px;
    }
    .branch-name { font-family: monospace; font-size: 13px; }
    .remove-btn {
      background: none; border: none; color: #cf222e;
      cursor: pointer; font-size: 18px; line-height: 1; padding: 0 2px; border-radius: 4px;
    }
    .remove-btn:hover { background: #ffebe9; }
    .add-form { display: flex; gap: 8px; margin-bottom: 8px; }
    .add-form input {
      flex: 1; padding: 6px 10px; border: 1px solid #d0d7de;
      border-radius: 6px; font-size: 13px; font-family: monospace; outline: none;
    }
    .add-form input:focus { border-color: #0969da; box-shadow: 0 0 0 3px rgba(9,105,218,0.3); }
    .add-btn {
      padding: 6px 12px; background: #1f883d; color: white;
      border: none; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 500;
      white-space: nowrap;
    }
    .add-btn:hover { background: #1a7f37; }
    .status { font-size: 12px; color: #57606a; min-height: 18px; text-align: center; margin-top: 4px; }
    .status.error { color: #cf222e; }

    /* Time window list items */
    .tw-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 6px 8px; background: #f6f8fa; border: 1px solid #d0d7de;
      border-radius: 6px; margin-bottom: 4px; gap: 6px;
    }
    .tw-info { display: flex; align-items: center; gap: 6px; flex: 1; min-width: 0; }
    .tw-days-display {
      font-family: monospace; font-size: 11px; font-weight: 700;
      color: #0969da; white-space: nowrap;
    }
    .tw-time-display { font-family: monospace; font-size: 12px; white-space: nowrap; }
    .tw-tz-display {
      font-size: 11px; color: #57606a;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }

    /* Time window add form */
    .tw-form {
      border: 1px solid #d0d7de; border-radius: 6px;
      padding: 8px; background: #f6f8fa; margin-bottom: 8px;
    }
    .tw-form-row {
      display: flex; align-items: center; gap: 6px; margin-bottom: 6px;
    }
    .tw-form-row:last-child { margin-bottom: 0; }
    .tw-form-row label {
      font-size: 11px; color: #57606a; white-space: nowrap; min-width: 32px;
    }
    .day-btn {
      padding: 3px 5px; border: 1px solid #d0d7de; border-radius: 4px;
      background: #fff; cursor: pointer; font-size: 11px; font-weight: 600;
      color: #57606a; min-width: 26px;
    }
    .day-btn:hover { background: #eaeef2; }
    .day-btn.active { background: #0969da; color: #fff; border-color: #0969da; }
    .days-row { display: flex; gap: 3px; }
    input[type="time"] {
      width: 88px; padding: 4px 6px; border: 1px solid #d0d7de;
      border-radius: 4px; font-size: 12px; outline: none;
    }
    input[type="time"]:focus { border-color: #0969da; }
    .tw-sep { font-size: 12px; color: #57606a; }
    .tz-input {
      flex: 1; padding: 4px 6px; border: 1px solid #d0d7de;
      border-radius: 4px; font-size: 12px; outline: none;
    }
    .tz-input:focus { border-color: #0969da; }
    .add-tw-btn {
      padding: 5px 10px; background: #1f883d; color: #fff;
      border: none; border-radius: 6px; cursor: pointer; font-size: 12px;
      font-weight: 500; white-space: nowrap;
    }
    .add-tw-btn:hover { background: #1a7f37; }
  </style>
</head>
<body>
  <div class="header">
    <h2>🔀 PR Branch Warning</h2>
    <button id="langToggle"><strong>EN</strong>&nbsp;/&nbsp;JA</button>
  </div>

  <div class="tabs">
    <button class="tab active" data-tab="branch">Branch</button>
    <button class="tab" data-tab="merge">Merge</button>
    <button class="tab" data-tab="time">Time</button>
  </div>

  <!-- Tab 1: Allowed base branches (existing feature) -->
  <div class="tab-content active" id="panel-branch">
    <p class="section-label" id="sectionLabel">Allowed base branches</p>
    <ul id="branchList"></ul>
    <div class="add-form">
      <input type="text" id="newBranch" placeholder="Branch name (e.g. develop)" autocomplete="off" />
      <button class="add-btn" id="addBtn">Add</button>
    </div>
  </div>

  <!-- Tab 2: Merge-into check (new) -->
  <div class="tab-content" id="panel-merge">
    <p class="section-label" id="mergeCheckLabel">Merge-into check branches</p>
    <p class="desc" id="mergeCheckDesc">Warn if the PR's head branch has not been merged into these branches yet.</p>
    <ul id="mergeCheckList"></ul>
    <div class="add-form">
      <input type="text" id="newMergeCheck" placeholder="Branch name (e.g. staging)" autocomplete="off" />
      <button class="add-btn" id="addMergeCheckBtn">Add</button>
    </div>
  </div>

  <!-- Tab 3: Time windows (new) -->
  <div class="tab-content" id="panel-time">
    <p class="section-label" id="timeWindowLabel">Allowed merge time windows</p>
    <ul id="timeWindowList"></ul>
    <div class="tw-form">
      <div class="tw-form-row">
        <label id="twDaysLabel">Days</label>
        <div class="days-row" id="twDaysRow">
          <button class="day-btn" data-day="1">Mon</button>
          <button class="day-btn" data-day="2">Tue</button>
          <button class="day-btn" data-day="3">Wed</button>
          <button class="day-btn" data-day="4">Thu</button>
          <button class="day-btn" data-day="5">Fri</button>
          <button class="day-btn" data-day="6">Sat</button>
          <button class="day-btn" data-day="7">Sun</button>
        </div>
      </div>
      <div class="tw-form-row">
        <label id="twFromLabel">From</label>
        <input type="time" id="twStart" value="10:00" />
        <span class="tw-sep">—</span>
        <label id="twToLabel">To</label>
        <input type="time" id="twEnd" value="18:00" />
      </div>
      <div class="tw-form-row">
        <label id="twTzLabel">TZ</label>
        <input type="text" class="tz-input" id="twTz" placeholder="Asia/Tokyo" autocomplete="off" />
        <button class="add-tw-btn" id="addTwBtn">Add Window</button>
      </div>
    </div>
  </div>

  <div class="status" id="status"></div>
  <script src="popup.js"></script>
</body>
</html>
